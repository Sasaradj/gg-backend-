<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GG Analiza - Auto Tipovi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f4f4f4; font-family: 'Inter', sans-serif; max-width: 680px; margin: 0 auto; padding: 0 0 40px; }
  .header { background: #fff; padding: 14px; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100; }
  h1 { font-size: 1.25rem; font-weight: 900; }
  .live-badge { font-size: 0.5rem; background: #f0fff4; border: 1px solid #86efac; color: #166534; padding: 2px 7px; border-radius: 10px; display: inline-block; }
  .panel { padding: 14px; }
  .liga-select { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; margin-bottom: 12px; }
  .btn-primary { width: 100%; padding: 12px; background: #111; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
  .btn-primary:disabled { opacity: 0.3; }
  .loading { text-align: center; padding: 30px; display: none; }
  .spinner { width: 28px; height: 28px; border: 2px solid #eee; border-top-color: #111; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .match-card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; margin-bottom: 12px; padding: 12px; transition: 0.2s; }
  .match-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.7rem; color: #888; }
  .match-teams { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .value-badge { background: #22c55e; color: white; font-size: 0.65rem; font-weight: bold; padding: 2px 8px; border-radius: 12px; display: inline-block; }
  .stats-grid { display: flex; gap: 12px; margin: 10px 0; }
  .stat { flex: 1; text-align: center; background: #f8f8f8; border-radius: 8px; padding: 6px; }
  .stat-num { font-size: 1.2rem; font-weight: 800; }
  .odds-row { display: flex; gap: 8px; margin-top: 8px; font-size: 0.7rem; color: #555; }
  hr { margin: 10px 0; border-color: #eee; }
  .error-msg { background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000; padding: 10px; border-radius: 8px; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
<div class="header">
  <h1>GG Analiza ⚽ <span class="live-badge">Auto tipovi</span></h1>
  <p>Narednih 7 dana · Value bet · GG / GG3+</p>
</div>
<div class="panel">
  <select id="leagueSelect" class="liga-select">
    <option value="39">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
    <option value="78">Bundesliga 🇩🇪</option>
    <option value="140">La Liga 🇪🇸</option>
    <option value="135">Serie A 🇮🇹</option>
    <option value="61">Ligue 1 🇫🇷</option>
    <option value="88">Eredivisie 🇳🇱</option>
  </select>
  <button id="fetchBtn" class="btn-primary" onclick="fetchAndAnalyze()">📅 Dohvati ponudu za sedmicu</button>
  <div id="errorMsg" class="error-msg"></div>
  <div id="loading" class="loading"><div class="spinner"></div><div>Učitavam mečeve i analiziram...</div></div>
  <div id="results"></div>
</div>

<script>
const BACKEND = 'https://gg-backend-vmuy.onrender.com'; // zamijeni svojim URL-om

async function fetchAndAnalyze() {
  const leagueId = document.getElementById('leagueSelect').value;
  const fetchBtn = document.getElementById('fetchBtn');
  const resultsDiv = document.getElementById('results');
  const errorDiv = document.getElementById('errorMsg');
  const loadingDiv = document.getElementById('loading');

  fetchBtn.disabled = true;
  errorDiv.style.display = 'none';
  resultsDiv.innerHTML = '';
  loadingDiv.style.display = 'block';

  try {
    // 1. Dohvati upcoming mečeve sa kvotama
    const upcomingRes = await fetch(`${BACKEND}/api/upcoming?leagueId=${leagueId}`);
    if (!upcomingRes.ok) throw new Error(`Greška pri dohvatu mečeva: ${upcomingRes.status}`);
    const matches = await upcomingRes.json();
    if (!matches.length) throw new Error('Nema mečeva u narednih 7 dana za ovu ligu.');

    // 2. Pošalji mečeve na batch analizu
    const analyzeRes = await fetch(`${BACKEND}/api/analyze-batch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ matches, leagueId: parseInt(leagueId) })
    });
    if (!analyzeRes.ok) throw new Error(`Greška pri analizi: ${analyzeRes.status}`);
    const results = await analyzeRes.json();

    // 3. Prikaz rezultata
    displayResults(results);
  } catch (err) {
    errorDiv.style.display = 'block';
    errorDiv.textContent = `⚠️ ${err.message}. Provjeri konzolu i da li je server pokrenut.`;
    console.error(err);
  } finally {
    loadingDiv.style.display = 'none';
    fetchBtn.disabled = false;
  }
}

function displayResults(results) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  const valid = results.filter(r => !r.error);
  if (!valid.length) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:#bbb;">Nema validnih mečeva za prikaz.</div>';
    return;
  }
  // Sortiraj po value bet razlici (opadajuće)
  valid.sort((a,b) => (b.value_gg || 0) - (a.value_gg || 0));
  for (const m of valid) {
    const ggClass = m.gg_percent >= 63 ? 'high' : (m.gg_percent >= 45 ? 'medium' : 'low');
    const card = document.createElement('div');
    card.className = 'match-card';
    card.innerHTML = `
      <div class="match-header">
        <span>${new Date(m.commence_time).toLocaleDateString()}</span>
        <span>H2H mečeva: ${m.h2h_matches} (GG% ${m.h2h_gg_pct}%)</span>
      </div>
      <div class="match-teams">${m.home} vs ${m.away}</div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-num">${m.gg_percent}%</div><div>GG</div>${m.implied_gg_pct ? `<div style="font-size:0.6rem;">impl. ${Math.round(m.implied_gg_pct)}%</div>` : ''}</div>
        <div class="stat"><div class="stat-num">${m.gg3_percent}%</div><div>GG3+</div></div>
        <div class="stat"><div class="stat-num">${m.avg_total}</div><div>avg gol</div></div>
      </div>
      ${m.odds.btts_yes ? `<div class="odds-row">📊 BTTS kvota: ${m.odds.btts_yes} ~ ${Math.round((1/m.odds.btts_yes)*100)}% impl.</div>` : ''}
      ${m.value_bet ? `<div><span class="value-badge">🎯 VALUE BET (${Math.round(m.value_gg)}% više od kvote)</span></div>` : ''}
      <hr>
      <div style="font-size:0.7rem;color:#555;">Preporuka: ${m.gg_percent >= 63 ? '✅ Igraj GG' : (m.gg_percent >= 45 ? '⚠️ Rizično' : '❌ Izbjegavaj')}</div>
    `;
    container.appendChild(card);
  }
}
</script>
</body>
</html>
