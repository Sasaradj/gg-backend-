<!DOCTYPE html>
<html>
<head>
<title>GG Analiza - Test</title>
</head>
<body>
<h1>GG Analiza ⚽</h1>
<select id="leagueSelect">
  <option value="soccer_italy_serie_a">Serie A</option>
  <option value="soccer_epl">Premier League</option>
  <option value="soccer_germany_bundesliga">Bundesliga</option>
</select>
<button onclick="fetchMatches()">Dohvati mečeve</button>
<pre id="results"></pre>
<script>
async function fetchMatches() {
  const sportKey = document.getElementById('leagueSelect').value;
  const res = await fetch(`/api/matches?sport_key=${sportKey}`);
  const data = await res.json();
  document.getElementById('results').innerHTML = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
